[build]
builder = "RAILPACK"

[deploy]
startCommand = "/mise/shims/python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
preDeployCommand = "/mise/shims/python -c \"from alembic.config import main; main(argv=['upgrade', 'head'])\""
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
